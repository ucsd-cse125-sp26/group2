name: CI

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ #
  #  Debug build + sanitizers — runs on every push and PR               #
  # ------------------------------------------------------------------ #
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: debug
            cc: clang
            cxx: clang++

          - name: macOS
            os: macos-latest
            preset: debug
            cc: clang
            cxx: clang++

          - name: Windows
            os: windows-latest
            preset: debug-win

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang clang-format clang-tidy \
            glslang-tools \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxss-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols \
            libpulse-dev libasound2-dev \
            libdbus-1-dev libudev-dev \
            libgl-dev libgles2-mesa-dev \
            libdrm-dev libgbm-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja glslang

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja + Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ninja -y
          choco install vulkan-sdk -y

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: ~/.cmake/packages
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-${{ runner.os }}-

      - name: Configure
        env:
          CC:  ${{ matrix.cc  || '' }}
          CXX: ${{ matrix.cxx || '' }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

  # ------------------------------------------------------------------ #
  #  Format check                                                        #
  # ------------------------------------------------------------------ #
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          find src -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) \
            | xargs clang-format --dry-run --Werror

  # ------------------------------------------------------------------ #
  #  clang-tidy — non-blocking                                           #
  # ------------------------------------------------------------------ #
  tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang clang-tidy glslang-tools \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxss-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols \
            libpulse-dev libasound2-dev \
            libdbus-1-dev libudev-dev \
            libgl-dev libgles2-mesa-dev \
            libdrm-dev libgbm-dev
      - name: Configure
        env:
          CC:  clang
          CXX: clang++
        run: cmake --preset release
      - name: Run clang-tidy
        run: |
          find src -type f -name "*.cpp" \
            | xargs clang-tidy -p build/release

  # ------------------------------------------------------------------ #
  #  Release builds — optimised, no sanitizers                          #
  #  Runs on: push to main  →  updates "latest" pre-release             #
  #            tag v*.*.*   →  creates versioned release                #
  # ------------------------------------------------------------------ #
  release-build:
    name: Release Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push'   # skip on PRs
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: release
            cc: clang
            cxx: clang++
            binary: titandoom
            archive: titandoom-linux-x86_64.tar.gz

          - name: macOS
            os: macos-latest
            preset: release
            cc: clang
            cxx: clang++
            binary: titandoom
            archive: titandoom-macos.tar.gz

          - name: Windows
            os: windows-latest
            preset: release
            binary: titandoom.exe
            archive: titandoom-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang glslang-tools \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxss-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols \
            libpulse-dev libasound2-dev \
            libdbus-1-dev libudev-dev \
            libgl-dev libgles2-mesa-dev \
            libdrm-dev libgbm-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja glslang

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja + Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ninja -y
          choco install vulkan-sdk -y

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: ~/.cmake/packages
          key: fetchcontent-release-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-release-${{ runner.os }}-

      - name: Configure
        env:
          CC:  ${{ matrix.cc  || '' }}
          CXX: ${{ matrix.cxx || '' }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      # ---- Package binary + shaders into a single archive ----
      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/shaders
          cp build/release/${{ matrix.binary }} dist/
          cp build/release/shaders/*.spv       dist/shaders/
          tar -czf ${{ matrix.archive }} -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\shaders | Out-Null
          Copy-Item build\release\${{ matrix.binary }}    dist\
          Copy-Item build\release\shaders\*.spv           dist\shaders\
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          retention-days: 7

  # ------------------------------------------------------------------ #
  #  Publish to GitHub Releases once all three platform builds succeed  #
  # ------------------------------------------------------------------ #
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: release-build
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4   # needed for gh CLI repo context

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Determine release metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}"          >> "$GITHUB_OUTPUT"
            echo "title=${{ github.ref_name }}"        >> "$GITHUB_OUTPUT"
            echo "prerelease=false"                    >> "$GITHUB_OUTPUT"
            echo "notes=Versioned release ${{ github.ref_name }}." >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest"                          >> "$GITHUB_OUTPUT"
            echo "title=Latest Build"                  >> "$GITHUB_OUTPUT"
            echo "prerelease=true"                     >> "$GITHUB_OUTPUT"
            echo "notes=Automated build from \`main\` — commit ${{ github.sha }}." >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing 'latest' release (rolling update)
        if: steps.meta.outputs.tag == 'latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes "${{ steps.meta.outputs.notes }}" \
            $PRERELEASE_FLAG \
            titandoom-linux-x86_64.tar.gz \
            titandoom-macos.tar.gz \
            titandoom-windows-x86_64.zip

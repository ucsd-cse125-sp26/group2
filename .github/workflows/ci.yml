name: CI

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ #
  #  Debug build + sanitizers — runs on every push and PR               #
  # ------------------------------------------------------------------ #
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: debug
            cc: clang
            cxx: clang++

          - name: macOS
            os: macos-latest
            preset: debug
            cc: clang
            cxx: clang++

          - name: Windows
            os: windows-latest
            preset: debug-win

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang clang-format clang-tidy \
            glslang-tools \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxss-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols \
            libpulse-dev libasound2-dev \
            libdbus-1-dev libudev-dev \
            libgl-dev libgles2-mesa-dev \
            libdrm-dev libgbm-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja glslang
          echo "$(brew --prefix glslang)/bin" >> "$GITHUB_PATH"

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install vulkan-sdk --yes
          $sdk = (Get-ChildItem "C:\VulkanSDK" | Sort-Object Name -Descending | Select-Object -First 1).FullName
          "$sdk\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "VULKAN_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV  -Encoding utf8 -Append

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: ~/.cmake/packages
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-${{ runner.os }}-

      - name: Configure
        env:
          CC:  ${{ matrix.cc  || '' }}
          CXX: ${{ matrix.cxx || '' }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

  # ------------------------------------------------------------------ #
  #  Format check — pinned to clang-format-18 (ships on ubuntu-24.04)  #
  # ------------------------------------------------------------------ #
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format-18
        run: sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: |
          find src -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) \
            | xargs clang-format-18 --dry-run --Werror

  # ------------------------------------------------------------------ #
  #  clang-tidy — non-blocking                                           #
  # ------------------------------------------------------------------ #
  tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang clang-tidy glslang-tools \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxss-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols \
            libpulse-dev libasound2-dev \
            libdbus-1-dev libudev-dev \
            libgl-dev libgles2-mesa-dev \
            libdrm-dev libgbm-dev
      - name: Configure
        # Use the debug preset (TITANDOOM_BUNDLE_SHADERS=OFF) so clang-tidy never
        # needs the generated embedded_shaders.hpp header, which only exists after
        # a full build with shader bundling enabled.
        env:
          CC:  clang
          CXX: clang++
        run: cmake --preset debug
      - name: Run clang-tidy
        run: |
          find src -type f -name "*.cpp" \
            | xargs clang-tidy -p build/debug

  # ------------------------------------------------------------------ #
  #  Release builds — optimised, shaders embedded, no sanitizers        #
  #  Runs on: push to main  →  updates "latest" pre-release             #
  #            tag v*.*.*   →  creates versioned release                #
  # ------------------------------------------------------------------ #
  release-build:
    name: Release Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push'   # skip on PRs
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: release
            cc: clang
            cxx: clang++
            client_src: build/release/titandoom
            server_src: build/release/titandoom-server
            client_artifact: titandoom-linux-x86_64
            server_artifact: titandoom-server-linux-x86_64

          - name: macOS
            os: macos-latest
            preset: release
            cc: clang
            cxx: clang++
            client_src: build/release/titandoom
            server_src: build/release/titandoom-server
            client_artifact: titandoom-macos
            server_artifact: titandoom-server-macos

          - name: Windows
            os: windows-latest
            preset: release
            client_src: build\release\titandoom.exe
            server_src: build\release\titandoom-server.exe
            client_artifact: titandoom-windows-x86_64.exe
            server_artifact: titandoom-server-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang glslang-tools \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxss-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols \
            libpulse-dev libasound2-dev \
            libdbus-1-dev libudev-dev \
            libgl-dev libgles2-mesa-dev \
            libdrm-dev libgbm-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja glslang
          echo "$(brew --prefix glslang)/bin" >> "$GITHUB_PATH"

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install vulkan-sdk --yes
          $sdk = (Get-ChildItem "C:\VulkanSDK" | Sort-Object Name -Descending | Select-Object -First 1).FullName
          "$sdk\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "VULKAN_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV  -Encoding utf8 -Append

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: ~/.cmake/packages
          key: fetchcontent-release-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-release-${{ runner.os }}-

      - name: Configure
        env:
          CC:  ${{ matrix.cc  || '' }}
          CXX: ${{ matrix.cxx || '' }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      # ---- Stage binaries with their release names (Linux / macOS) ----
      - name: Stage binaries (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cp ${{ matrix.client_src }} ${{ matrix.client_artifact }}
          cp ${{ matrix.server_src }} ${{ matrix.server_artifact }}

      # ---- Stage binaries with their release names (Windows) ----
      - name: Stage binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item ${{ matrix.client_src }} ${{ matrix.client_artifact }}
          Copy-Item ${{ matrix.server_src }} ${{ matrix.server_artifact }}

      - name: Upload client binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.client_artifact }}
          path: ${{ matrix.client_artifact }}
          retention-days: 7

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.server_artifact }}
          path: ${{ matrix.server_artifact }}
          retention-days: 7

  # ------------------------------------------------------------------ #
  #  Publish to GitHub Releases once all three platform builds succeed  #
  # ------------------------------------------------------------------ #
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: release-build
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4   # needed for gh CLI repo context

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Determine release metadata
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}"                                  >> "$GITHUB_OUTPUT"
            echo "title=${GITHUB_REF_NAME}"                                >> "$GITHUB_OUTPUT"
            echo "prerelease=false"                                        >> "$GITHUB_OUTPUT"
            echo "notes=Versioned release ${GITHUB_REF_NAME}."            >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest"                                              >> "$GITHUB_OUTPUT"
            echo "title=Latest Build"                                      >> "$GITHUB_OUTPUT"
            echo "prerelease=true"                                         >> "$GITHUB_OUTPUT"
            echo "notes=Automated build from \`main\` — commit ${GITHUB_SHA}." >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing 'latest' release (rolling update)
        if: steps.meta.outputs.tag == 'latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG:       ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE:     ${{ steps.meta.outputs.title }}
          RELEASE_NOTES:     ${{ steps.meta.outputs.notes }}
          RELEASE_PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TITLE" \
            --notes "$RELEASE_NOTES" \
            $PRERELEASE_FLAG \
            titandoom-linux-x86_64 \
            titandoom-server-linux-x86_64 \
            titandoom-macos \
            titandoom-server-macos \
            titandoom-windows-x86_64.exe \
            titandoom-server-windows-x86_64.exe

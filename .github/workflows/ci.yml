name: CI

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ #
  #  Debug build — PRs only; release build covers main                  #
  # ------------------------------------------------------------------ #
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'pull_request'
    env:
      SCCACHE_GHA_ENABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: debug
            cc: clang
            cxx: clang++

          - name: macOS
            os: macos-latest
            preset: debug
            cc: clang
            cxx: clang++

          - name: Windows
            os: windows-latest
            preset: debug-win
            cc: cl
            cxx: cl
            # sccache + MSVC requires embedded debug info (/Z7 not /Zi)
            extra_cmake: -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang clang-format-18 clang-tidy \
            glslang-tools \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxss-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols \
            libpulse-dev libasound2-dev \
            libdbus-1-dev libudev-dev \
            libgl-dev libgles2-mesa-dev \
            libdrm-dev libgbm-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          which ninja || brew install ninja
          brew install glslang spirv-cross
          echo "$(brew --prefix glslang)/bin"    >> "$GITHUB_PATH"
          echo "$(brew --prefix spirv-cross)/bin" >> "$GITHUB_PATH"

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # VS2022 (via msvc-dev-cmd) already ships Ninja — no choco install needed.
      # Vulkan SDK provides glslc, required at configure time by CMakeLists.txt
      # even when GROUP2_BUNDLE_SHADERS=OFF (shaders compile to .spv at build time).
      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Setup sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cmake/packages
            ${{ github.workspace }}/build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/Ultralight.cmake') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.preset }}-

      - name: Configure
        shell: bash
        env:
          CC:  ${{ matrix.cc  || '' }}
          CXX: ${{ matrix.cxx || '' }}
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DFETCHCONTENT_UPDATES_DISCONNECTED=ON \
            ${{ matrix.extra_cmake || '' }}

      - name: Build
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Validate MSL shaders (macOS)
        if: runner.os == 'macOS'
        run: |
          for f in build/${{ matrix.preset }}/shaders/*.msl; do
            echo "Validating $f ..."
            xcrun -sdk macosx metal -fsyntax-only -x metal "$f"
          done

  # ------------------------------------------------------------------ #
  #  Format check — pinned to clang-format-18 (ships on ubuntu-24.04)  #
  # ------------------------------------------------------------------ #
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format-18
        run: sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: |
          find src -type f \( -name "*.cpp" -o -name "*.hpp" -o -name "*.h" \) \
            | xargs clang-format-18 --dry-run --Werror

  # ------------------------------------------------------------------ #
  #  clang-tidy — non-blocking                                           #
  # ------------------------------------------------------------------ #
  tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang clang-tidy \
            glslang-tools \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxss-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols \
            libpulse-dev libasound2-dev \
            libdbus-1-dev libudev-dev \
            libgl-dev libgles2-mesa-dev \
            libdrm-dev libgbm-dev

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cmake/packages
            ${{ github.workspace }}/build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/Ultralight.cmake') }}
          restore-keys: deps-Linux-debug-

      - name: Configure
        env:
          CC:  clang
          CXX: clang++
        run: |
          cmake --preset debug \
            -DFETCHCONTENT_UPDATES_DISCONNECTED=ON

      - name: Run clang-tidy
        run: |
          python3 -c "
          import json, subprocess, sys
          with open('build/debug/compile_commands.json') as f:
              files = [e['file'] for e in json.load(f)
                       if '/src/' in e['file'] and '/_deps/' not in e['file']]
          result = subprocess.run(['clang-tidy', '-p', 'build/debug'] + files)
          sys.exit(result.returncode)
          "

  # ------------------------------------------------------------------ #
  #  Release builds — optimised, shaders embedded, no sanitizers        #
  #  Runs on: push to main  →  updates "latest" pre-release             #
  #            tag v*.*.*   →  creates versioned release                #
  # ------------------------------------------------------------------ #
  release-build:
    name: Release Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'push'
    env:
      SCCACHE_GHA_ENABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            preset: release
            cc: clang
            cxx: clang++
            binary_src: build/release/group2
            artifact: group2-linux-x86_64

          - name: macOS
            os: macos-latest
            preset: release
            cc: clang
            cxx: clang++
            binary_src: build/release/group2
            artifact: group2-macos

          - name: Windows
            os: windows-latest
            preset: release-win
            cc: cl
            cxx: cl
            binary_src: build\release-win\group2.exe
            artifact: group2-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build clang glslang-tools spirv-cross \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxss-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols \
            libpulse-dev libasound2-dev \
            libdbus-1-dev libudev-dev \
            libgl-dev libgles2-mesa-dev \
            libdrm-dev libgbm-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          # ninja is pre-installed on macos-latest; skip the brew install
          which ninja || brew install ninja
          brew install glslang spirv-cross
          echo "$(brew --prefix glslang)/bin"    >> "$GITHUB_PATH"
          echo "$(brew --prefix spirv-cross)/bin" >> "$GITHUB_PATH"

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: latest
          cache: true

      - name: Setup sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cmake/packages
            ${{ github.workspace }}/build/_deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/Ultralight.cmake') }}
          restore-keys: deps-${{ runner.os }}-release-

      - name: Configure
        shell: bash
        env:
          CC:  ${{ matrix.cc  || '' }}
          CXX: ${{ matrix.cxx || '' }}
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DFETCHCONTENT_UPDATES_DISCONNECTED=ON

      - name: Build
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Validate MSL shaders (macOS)
        if: runner.os == 'macOS'
        run: |
          for f in build/${{ matrix.preset }}/shaders/*.msl; do
            echo "Validating $f ..."
            xcrun -sdk macosx metal -fsyntax-only -x metal "$f"
          done

      - name: Stage binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: cp ${{ matrix.binary_src }} ${{ matrix.artifact }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item ${{ matrix.binary_src }} ${{ matrix.artifact }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  # ------------------------------------------------------------------ #
  #  Publish to GitHub Releases once all three platform builds succeed  #
  # ------------------------------------------------------------------ #
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: release-build
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Determine release metadata
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}"                                  >> "$GITHUB_OUTPUT"
            echo "title=${GITHUB_REF_NAME}"                                >> "$GITHUB_OUTPUT"
            echo "prerelease=false"                                        >> "$GITHUB_OUTPUT"
            echo "notes=Versioned release ${GITHUB_REF_NAME}."            >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest"                                              >> "$GITHUB_OUTPUT"
            echo "title=Latest Build"                                      >> "$GITHUB_OUTPUT"
            echo "prerelease=true"                                         >> "$GITHUB_OUTPUT"
            echo "notes=Automated build from \`main\` — commit ${GITHUB_SHA}." >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing 'latest' release (rolling update)
        if: steps.meta.outputs.tag == 'latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG:        ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE:      ${{ steps.meta.outputs.title }}
          RELEASE_NOTES:      ${{ steps.meta.outputs.notes }}
          RELEASE_PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TITLE" \
            --notes "$RELEASE_NOTES" \
            $PRERELEASE_FLAG \
            group2-linux-x86_64 \
            group2-macos \
            group2-windows-x86_64.exe
